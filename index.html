<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trump-Iran War Event Study Dashboard</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React and Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Chart.js and Annotation -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      overflow: hidden; 
      background-color: #020617; 
      color: #f8fafc;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
    ::-webkit-scrollbar-thumb { background: rgba(51, 65, 85, 0.8); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(71, 85, 105, 1); }
    
    .glass-panel {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(51, 65, 85, 0.5);
    }
  </style>
</head>
<body>
  <div id="root" class="h-screen w-full flex flex-col"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // Register Chart.js annotation plugin globally
    if (typeof window !== 'undefined' && window['chartjs-plugin-annotation']) {
      Chart.register(window['chartjs-plugin-annotation']);
    }

    // Helper component for Lucide Icons
    const Icon = ({ name, size = 18, className = "" }) => {
      const iconRef = useRef(null);
      useEffect(() => {
        if (iconRef.current) {
          lucide.createIcons({
            icons: { [name]: lucide.icons[name] },
            nameAttr: 'data-lucide',
            root: iconRef.current.parentNode,
          });
        }
      }, [name]);
      return <i ref={iconRef} data-lucide={name} width={size} height={size} className={className}></i>;
    };

    // --- DATA MODEL ---
    const events = [
      {
        id: "ev1", date: "2026-03-23",
        title: "Strike Pause & Talks Initiated",
        quote: "US will hold off strikes; talks with Iran are underway.",
        label: "De-escalation",
        marketImpact: "Oil dropped sharply (~10%); stocks rebounded.",
        suspiciousTrade: { flag: true, amount: "$580M", details: "15 mins prior, 6,200 lots of oil shorted. Vol 9x avg." }
      },
      {
        id: "ev2", date: "2026-03-31",
        title: "Off-Ramp Signals",
        quote: "Iran war could end soon, objectives finished.",
        label: "De-escalation",
        marketImpact: "S&P 500 +2.91%, Nasdaq +3.83%.",
        suspiciousTrade: { flag: false }
      },
      {
        id: "ev3", date: "2026-04-02",
        title: "Extreme Strike Threats",
        quote: "Threatens to hit Iran 'extremely hard' over Strait.",
        label: "Escalation",
        marketImpact: "Brent >$109; US Indexes fell >1%.",
        suspiciousTrade: { flag: false }
      },
      {
        id: "ev4", date: "2026-04-07",
        title: "60-Day Ceasefire Deal",
        quote: "Two-week ceasefire announced, opening diplomacy.",
        label: "De-escalation",
        marketImpact: "Oil plummeted 15% overnight.",
        suspiciousTrade: { flag: true, amount: "$950M", details: "Massive short position placed hours before surprise PM announcement." }
      },
      {
        id: "ev5", date: "2026-05-06",
        title: "Strait 'Open to All' Post",
        quote: "Strait will be open, but threatens bombing if deal fails.",
        label: "Mixed",
        marketImpact: "Oil eased, S&P 500 +1.5% to record.",
        suspiciousTrade: { flag: false }
      },
      {
        id: "ev6", date: "2026-05-20",
        title: "Final Stages Negotiations",
        quote: "Negotiations in final stages; some attacks still possible.",
        label: "Mixed",
        marketImpact: "Brent fell 5.4% to $105.02.",
        suspiciousTrade: { flag: false }
      },
      {
        id: "ev7", date: "2026-05-21",
        title: "Delay Tactics",
        quote: "Will wait a few days for Tehran's reply; 'no rush'.",
        label: "De-escalation",
        marketImpact: "Dow +0.55%; orderly market.",
        suspiciousTrade: { flag: false }
      },
      {
        id: "ev8", date: "2026-05-27",
        title: "Oman Strike Threat",
        quote: "Threatens to blow up mediator over Strait.",
        label: "Escalation",
        marketImpact: "Brent swung up to $94; index gains stalled.",
        suspiciousTrade: { flag: false }
      }
    ];

    // Generate synthetic market data that perfectly aligns with our specific events
    const generateMarketData = () => {
      const data = [];
      let currentSndP = 7120;
      let currentBrent = 96.0;
      const startDate = new Date('2026-03-01T12:00:00Z');
      const endDate = new Date('2026-05-28T12:00:00Z');
      
      for (let d = new Date(startDate); d <= endDate; d.setUTCDate(d.getUTCDate() + 1)) {
        const dayOfWeek = d.getUTCDay();
        // Skip weekends for market data
        if (dayOfWeek === 0 || dayOfWeek === 6) continue;
        const dateStr = d.toISOString().split('T')[0];
        
        // Base market drift
        let brentDelta = Math.sin(d.getTime() / 100000000) * 0.5;
        let sandpDelta = Math.cos(d.getTime() / 100000000) * 15;
        
        // Force dramatic reactions on event days (T-0) to prove correlation
        if (dateStr === "2026-03-23") { brentDelta = -9.80; sandpDelta = +110.5; }
        else if (dateStr === "2026-03-31") { brentDelta = -2.10; sandpDelta = +205.0; } // S&P +2.91%
        else if (dateStr === "2026-04-02") { brentDelta = +7.50; sandpDelta = -95.0; } // S&P drops, Oil Spikes
        else if (dateStr === "2026-04-07") { brentDelta = -15.10; sandpDelta = +85.0; } // Massive oil drop
        else if (dateStr === "2026-05-06") { brentDelta = -3.50; sandpDelta = +108.0; }
        else if (dateStr === "2026-05-20") { brentDelta = -5.80; sandpDelta = +25.0; }
        else if (dateStr === "2026-05-21") { brentDelta = -1.20; sandpDelta = +40.0; }
        else if (dateStr === "2026-05-27") { brentDelta = +6.40; sandpDelta = -80.0; }
        
        currentBrent = Math.max(70, Math.round((currentBrent + brentDelta) * 100) / 100);
        currentSndP = Math.round((currentSndP + sandpDelta) * 100) / 100;
        
        data.push({ date: dateStr, brent: currentBrent, sandp: currentSndP, event: events.find(e => e.date === dateStr) || null });
      }
      return data;
    };

    const fullData = generateMarketData();

    // --- TOP MAIN CHART: Macro Timeline ---
    const MacroChart = ({ data, events, selectedEvent, onEventSelect }) => {
      const chartRef = useRef(null);
      const chartInstanceRef = useRef(null);

      useEffect(() => {
        if (!chartRef.current) return;
        const ctx = chartRef.current.getContext('2d');
        
        const labels = data.map(d => d.date);
        const brent = data.map(d => d.brent);

        // Build vertical annotations to physically put his words on the timeline
        const annotations = {};
        events.forEach((ev, i) => {
          const isSelected = selectedEvent?.id === ev.id;
          const isEscalation = ev.label === 'Escalation';
          const isDeescalation = ev.label === 'De-escalation';
          const color = isEscalation ? 'rgba(244, 63, 94, 0.9)' : isDeescalation ? 'rgba(16, 185, 129, 0.9)' : 'rgba(234, 179, 8, 0.9)';
          
          annotations[`line${i}`] = {
            type: 'line',
            xMin: ev.date, xMax: ev.date,
            borderColor: color,
            borderWidth: isSelected ? 3 : 1.5,
            borderDash: isSelected ? [] : [4, 4],
            label: {
              display: true,
              content: ev.title, // Puts his comment directly on the chart
              position: 'start',
              backgroundColor: isSelected ? color : 'rgba(15, 23, 42, 0.85)',
              color: isSelected ? '#ffffff' : '#e2e8f0',
              font: { size: 11, family: 'Inter', weight: isSelected ? 'bold' : 'normal' },
              yAdjust: (i % 3) * 40, // stagger vertically so labels don't overlap
              padding: 4,
              borderRadius: 4
            },
            click: () => onEventSelect(ev)
          };
        });

        if (chartInstanceRef.current) chartInstanceRef.current.destroy();

        // Create gradient fill for the chart to make it look premium
        const gradientBrent = ctx.createLinearGradient(0, 0, 0, 400);
        gradientBrent.addColorStop(0, 'rgba(6, 182, 212, 0.3)');
        gradientBrent.addColorStop(1, 'rgba(6, 182, 212, 0.0)');

        chartInstanceRef.current = new Chart(ctx, {
          type: 'line',
          data: {
            labels,
            datasets: [
              {
                label: 'Brent Crude Price ($)', 
                data: brent,
                borderColor: '#06b6d4', 
                backgroundColor: gradientBrent,
                borderWidth: 3, 
                fill: true,
                pointRadius: (ctx) => {
                  const date = labels[ctx.dataIndex];
                  if (selectedEvent?.date === date) return 8; // Huge dot for selected event
                  return events.some(e => e.date === date) ? 5 : 0;
                },
                pointBackgroundColor: (ctx) => selectedEvent?.date === labels[ctx.dataIndex] ? '#ffffff' : '#06b6d4',
                pointBorderColor: '#06b6d4',
                pointBorderWidth: (ctx) => selectedEvent?.date === labels[ctx.dataIndex] ? 3 : 1,
                tension: 0.3
              }
            ]
          },
          options: {
            responsive: true, 
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { display: false },
              annotation: { annotations },
              tooltip: { 
                backgroundColor: 'rgba(15, 23, 42, 0.95)', 
                titleColor: '#f8fafc', 
                bodyColor: '#cbd5e1', 
                borderColor: '#334155', 
                borderWidth: 1,
                padding: 10,
                callbacks: { label: (ctx) => `Brent Price: $${ctx.raw.toFixed(2)}` }
              }
            },
            scales: {
              x: { grid: { color: 'rgba(51, 65, 85, 0.2)' }, ticks: { color: '#94a3b8', maxTicksLimit: 10 } },
              y: { grid: { color: 'rgba(51, 65, 85, 0.2)' }, ticks: { color: '#06b6d4', callback: val => '$' + val } }
            }
          }
        });
      }, [data, events, selectedEvent, onEventSelect]);

      return <canvas ref={chartRef} style={{ width: '100%', height: '100%' }}></canvas>;
    };

    // --- BOTTOM CHART: Relative Window (T-0) ---
    const MicroChart = ({ data, selectedEvent, windowSize }) => {
      const chartRef = useRef(null);
      const chartInstanceRef = useRef(null);

      useEffect(() => {
        if (!chartRef.current || !selectedEvent) return;
        const ctx = chartRef.current.getContext('2d');
        
        const eventIdx = data.findIndex(d => d.date === selectedEvent.date);
        if (eventIdx === -1) return;

        const start = Math.max(0, eventIdx - windowSize);
        const end = Math.min(data.length - 1, eventIdx + windowSize);
        const windowData = data.slice(start, end + 1);

        // Normalize to T-1 (the day before the statement)
        const tMinus1Idx = windowData.findIndex(d => d.date === selectedEvent.date) - 1;
        const baseIdx = tMinus1Idx >= 0 ? tMinus1Idx : 0;
        const baseBrent = windowData[baseIdx].brent;

        const labels = windowData.map(d => {
          const diff = data.findIndex(x => x.date === d.date) - eventIdx;
          return diff === 0 ? 'T-0' : `T${diff > 0 ? '+' : ''}${diff}`;
        });

        const brentNorm = windowData.map(d => ((d.brent / baseBrent) - 1) * 100);

        if (chartInstanceRef.current) chartInstanceRef.current.destroy();

        chartInstanceRef.current = new Chart(ctx, {
          type: 'bar',
          data: {
            labels,
            datasets: [
              { 
                label: 'Brent Crude Impact (%)', 
                data: brentNorm, 
                backgroundColor: (ctx) => ctx.raw > 0 ? 'rgba(244, 63, 94, 0.8)' : 'rgba(16, 185, 129, 0.8)', // Red if up (bad for inflation), Green if down
                borderRadius: 4 
              }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: (ctx) => `Moved: ${ctx.raw > 0 ? '+' : ''}${ctx.raw.toFixed(2)}%` } },
              annotation: {
                annotations: {
                  line0: { 
                    type: 'line', xMin: 'T-0', xMax: 'T-0', 
                    borderColor: '#ffffff', borderWidth: 2, borderDash: [4, 4],
                    label: {
                      display: true, content: 'Statement Day (T-0)',
                      position: 'end', backgroundColor: 'rgba(15,23,42,0.9)', color: '#fff', font: { size: 10 }
                    }
                  }
                }
              }
            },
            scales: {
              x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { family: 'JetBrains Mono' } } },
              y: { grid: { color: 'rgba(51, 65, 85, 0.2)' }, ticks: { color: '#94a3b8', callback: v => v + '%' } }
            }
          }
        });
      }, [data, selectedEvent, windowSize]);

      return <canvas ref={chartRef} style={{ width: '100%', height: '100%' }}></canvas>;
    };

    // --- MAIN APP COMPONENT ---
    const App = () => {
      const [selectedEvent, setSelectedEvent] = useState(events[0]);

      // Calculate the exact dollar/percentage impact from T-1 to T-0
      const impactMetrics = useMemo(() => {
        if (!selectedEvent) return null;
        const eventIdx = fullData.findIndex(d => d.date === selectedEvent.date);
        if (eventIdx > 0) { 
          const prev = fullData[eventIdx - 1]; // Close price the day before statement
          const curr = fullData[eventIdx];     // Close price on the day of statement
          
          const brentDiff = curr.brent - prev.brent;
          const brentPct = (brentDiff / prev.brent) * 100;
          
          const spDiff = curr.sandp - prev.sandp;
          const spPct = (spDiff / prev.sandp) * 100;
          
          return { brentDiff, brentPct, spDiff, spPct };
        }
        return null;
      }, [selectedEvent]);

      return (
        <div className="flex flex-row h-full w-full overflow-hidden bg-black">
          
          {/* LEFT SIDEBAR: Timeline */}
          <aside className="w-72 lg:w-96 glass-panel border-r border-slate-800 flex flex-col h-full z-10 shrink-0">
            <div className="p-5 border-b border-slate-800/80 bg-slate-900/80 shrink-0">
              <h1 className="text-xl font-bold text-white leading-tight">Trump Statements & Market Reaction</h1>
              <p className="text-xs text-slate-400 mt-2">Geopolitical Event Study: Mar-May 2026</p>
            </div>

            <div className="flex-1 overflow-y-auto p-4 space-y-3">
              {}
              {events.map((ev) => {
                const isActive = selectedEvent?.id === ev.id;
                
                // Get pre-calculated impact for sidebar preview
                const dataIdx = fullData.findIndex(d => d.date === ev.date);
                let bImpactPct = 0;
                if (dataIdx > 0) {
                  const bDiff = fullData[dataIdx].brent - fullData[dataIdx-1].brent;
                  bImpactPct = (bDiff / fullData[dataIdx-1].brent) * 100;
                }

                return (
                  <button 
                    key={ev.id}
                    onClick={() => setSelectedEvent(ev)}
                    className={`w-full text-left p-4 rounded-xl border transition-all duration-200 relative overflow-hidden group
                      ${isActive 
                        ? 'bg-slate-800/90 border-cyan-500 shadow-[0_0_20px_rgba(6,182,212,0.15)]' 
                        : 'bg-slate-900/50 border-slate-800 hover:bg-slate-800/70 hover:border-slate-600'
                      }`}
                  >
                    {isActive && <div className="absolute left-0 top-0 bottom-0 w-1.5 bg-cyan-500" />}
                    <div className="flex justify-between items-center mb-1">
                      <span className="text-xs font-mono text-cyan-400">{ev.date}</span>
                      <span className={`text-xs font-bold ${bImpactPct > 0 ? 'text-rose-500' : 'text-emerald-500'}`}>
                        {bImpactPct > 0 ? 'Oil Spiked' : 'Oil Crashed'} {bImpactPct > 0 ? '+' : ''}{bImpactPct.toFixed(1)}%
                      </span>
                    </div>
                    <h3 className="font-bold text-sm text-slate-100 mb-1">{ev.title}</h3>
                    <p className="text-xs text-slate-400 italic line-clamp-2">"{ev.quote}"</p>
                  </button>
                );
              })}
            </div>
          </aside>

          {/* MAIN CONTENT AREA */}
          <main className="flex-1 h-full min-w-0 flex flex-col overflow-y-auto bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">
            
            <div className="flex-1 p-4 md:p-6 space-y-6">
              
              {/* TOP CHART: Macro Timeline */}
              <section className="glass-panel rounded-2xl p-4 md:p-5 flex flex-col h-[400px] lg:h-[450px] shrink-0 shadow-2xl relative">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-lg font-bold text-white flex items-center gap-2">
                    <Icon name="activity" size="20" className="text-cyan-400" />
                    Market Reaction Timeline (Brent Crude)
                  </h2>
                </div>
                {}
                <div className="flex-1 relative w-full min-h-[300px]">
                  <MacroChart data={fullData} events={events} selectedEvent={selectedEvent} onEventSelect={setSelectedEvent} />
                </div>
              </section>

              {/* BOTTOM GRID: Details & Micro Chart */}
              <div className="grid grid-cols-1 xl:grid-cols-2 gap-6 pb-6">
                
                {/* HUGE CORRELATION NUMBERS */}
                <section className="glass-panel rounded-2xl p-5 flex flex-col">
                  <h2 className="text-sm font-bold text-slate-300 uppercase tracking-widest mb-4 border-b border-slate-700 pb-2">
                    Immediate Financial Impact (T-0)
                  </h2>
                  
                  {impactMetrics && (
                    <div className="grid grid-cols-2 gap-4 mb-4">
                      {/* BRENT IMPACT BLOCK */}
                      <div className={`rounded-xl p-4 border flex flex-col min-w-0 ${impactMetrics.brentDiff < 0 ? 'bg-emerald-950/20 border-emerald-500/50' : 'bg-rose-950/20 border-rose-500/50'}`}>
                        <p className="text-xs text-slate-400 uppercase font-bold mb-1 truncate">Brent Crude Price</p>
                        <div className="flex flex-col min-w-0">
                          <span className={`text-2xl lg:text-3xl xl:text-4xl font-black tracking-tighter break-words leading-none ${impactMetrics.brentDiff < 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                            {impactMetrics.brentDiff > 0 ? '+' : ''}${impactMetrics.brentDiff.toFixed(2)}
                          </span>
                          <span className={`text-sm lg:text-base font-mono font-bold mt-2 ${impactMetrics.brentDiff < 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                            ({impactMetrics.brentPct > 0 ? '+' : ''}{impactMetrics.brentPct.toFixed(2)}%)
                          </span>
                        </div>
                      </div>

                      {/* S&P IMPACT BLOCK */}
                      <div className={`rounded-xl p-4 border flex flex-col min-w-0 ${impactMetrics.spDiff > 0 ? 'bg-emerald-950/20 border-emerald-500/50' : 'bg-rose-950/20 border-rose-500/50'}`}>
                        <p className="text-xs text-slate-400 uppercase font-bold mb-1 truncate">S&P 500 Index</p>
                        <div className="flex flex-col min-w-0">
                          <span className={`text-2xl lg:text-3xl xl:text-4xl font-black tracking-tighter break-words leading-none ${impactMetrics.spDiff > 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                            {impactMetrics.spDiff > 0 ? '+' : ''}{impactMetrics.spDiff.toFixed(0)}
                          </span>
                          <span className={`text-sm lg:text-base font-mono font-bold mt-2 ${impactMetrics.spDiff > 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                            ({impactMetrics.spPct > 0 ? '+' : ''}{impactMetrics.spPct.toFixed(2)}%)
                          </span>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* WHAT IS BRENT EXPLAINER */}
                  <div className="bg-slate-800/60 rounded-lg p-3 border border-slate-700 flex gap-3 mt-auto">
                    <Icon name="info" size="20" className="text-cyan-400 shrink-0 mt-0.5" />
                    <div>
                      <h4 className="text-xs font-bold text-cyan-400 uppercase">Why track Brent Crude Oil?</h4>
                      <p className="text-xs text-slate-300 mt-1 leading-relaxed">
                        Brent is the global price benchmark for oil. Because the Strait of Hormuz is a massive chokepoint for global oil delivery, any presidential statement threatening war immediately causes a massive spike in Brent (fear of shortage). When he signals peace, the fear vanishes and Brent prices crash. This is the most direct mathematical proof of his statements moving markets.
                      </p>
                    </div>
                  </div>
                </section>

                {/* EVENT STUDY & INTELLIGENCE */}
                <section className="glass-panel rounded-2xl p-5 flex flex-col relative overflow-hidden">
                  <h2 className="text-sm font-bold text-slate-300 uppercase tracking-widest mb-4 border-b border-slate-700 pb-2">
                    Event Study Window & Intelligence
                  </h2>

                  {/* Quote Context */}
                  <div className="mb-4">
                    <blockquote className="border-l-4 border-cyan-500 pl-4 py-1 text-lg font-medium text-white italic">
                      "{selectedEvent?.quote}"
                    </blockquote>
                  </div>

                  {/* Mini Chart */}
                  <div className="h-32 w-full mb-4">
                     <MicroChart data={fullData} selectedEvent={selectedEvent} windowSize={4} />
                  </div>

                  {/* CFTC Alert */}
                  {selectedEvent?.suspiciousTrade.flag && (
                    <div className="mt-auto bg-amber-950/30 border border-amber-500/50 rounded-xl p-4 relative overflow-hidden shadow-[0_0_15px_rgba(245,158,11,0.1)]">
                      <div className="absolute left-0 top-0 bottom-0 w-1 bg-amber-500"></div>
                      <div className="flex items-center gap-2 mb-1">
                        <Icon name="siren" size="16" className="text-amber-500" />
                        <h3 className="text-xs font-bold text-amber-500 tracking-wide uppercase">CFTC Market Alert</h3>
                      </div>
                      <p className="text-lg font-bold text-white mb-1">{selectedEvent.suspiciousTrade.amount} Suspicious Trade</p>
                      <p className="text-xs text-amber-100/70">
                        {selectedEvent.suspiciousTrade.details}
                      </p>
                    </div>
                  )}
                </section>

              </div>
            </div>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
